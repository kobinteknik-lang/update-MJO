<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Request System PRO</title>

    <!-- Bootstrap 5 CSS & FontAwesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    :root {
        --bg-main: #f4f6f9;
        --shadow: 0 4px 12px rgba(0,0,0,.08);
    }

    body {
        background: var(--bg-main);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }

    .card {
        border: none;
        box-shadow: var(--shadow);
        border-radius: 12px;
    }

    .hidden { display: none !important; }

    .form-label {
        font-weight: 600;
        font-size: 13px;
        color: #444;
    }

    .ticket-badge {
        font-size: 11px;
        background: #212529;
        color: #fff;
        padding: 4px 8px;
        border-radius: 6px;
        font-family: monospace;
    }

    .priority-badge {
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 6px;
        font-weight: bold;
    }
    .priority-HIGH { background: #fee2e2; color: #dc2626; }
    .priority-MEDIUM { background: #fef9c3; color: #ca8a04; }
    .priority-LOW { background: #dcfce7; color: #16a34a; }

    /* Mobile Responsive Card Table */
    @media (max-width: 768px) {
        .time-picker-wrapper { flex-wrap: wrap; }
        .time-picker-wrapper .btn-now { width: 100%; margin-top: 4px; }

        .mobile-card-table table, 
        .mobile-card-table thead, 
        .mobile-card-table tbody, 
        .mobile-card-table th, 
        .mobile-card-table td, 
        .mobile-card-table tr { display: block; }

        .mobile-card-table thead { display: none; }

        .mobile-card-table tr {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 12px;
            padding: 12px;
        }

        .mobile-card-table td {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border: none;
            border-bottom: 1px dashed #f1f5f9;
            font-size: 13px;
        }

        .mobile-card-table td:last-child { border-bottom: none; }

        .mobile-card-table td::before {
            content: attr(data-label);
            font-weight: 600;
            color: #64748b;
        }
    }
    </style>
</head>

<body>

<div class="container my-3 my-md-4">

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="card p-4 mx-auto" style="max-width:380px">
        <div class="text-center mb-3">
            <i class="fa-solid fa-gears fa-3x text-primary mb-2"></i>
            <h4 class="fw-bold">Work Request PRO</h4>
            <small class="text-muted">Sistem Manajemen Pemeliharaan & Fasilitas</small>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" id="btnLogin" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Login
            </button>
        </form>
    </div>

    <!-- APP SECTION -->
    <div id="appSection" class="hidden">

        <!-- HEADER -->
        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h5 class="mb-0 fw-bold"><i class="fa-solid fa-chart-line text-primary me-2"></i>Dashboard Utama</h5>
                    <small class="text-muted">Work Request Management System</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span id="loginInfo" class="badge bg-success py-2 px-3"></span>
                    <button id="btnLogout" class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-power-off"></i> Logout</button>
                </div>
            </div>
            <div class="text-center mt-2 pt-2 border-top">
                <small id="clockIndo" class="text-secondary fw-medium"></small>
            </div>
        </div>

        <!-- COUNTER CARDS -->
        <div class="row mb-3 text-center g-2">
            <div class="col-4">
                <div class="card p-2 bg-danger text-white">
                    <small class="fw-bold">OPEN</small>
                    <h3 id="openCount" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
            <div class="col-4">
                <div class="card p-2 bg-warning text-dark">
                    <small class="fw-bold">PROGRESS</small>
                    <h3 id="progressCount" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
            <div class="col-4" id="doneCard">
                <div class="card p-2 bg-success text-white">
                    <small class="fw-bold">DONE</small>
                    <h3 id="doneCount" class="mb-0 fw-bold">0</h3>
                </div>
            </div>
        </div>

        <!-- FORM INPUT WORK REQUEST -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white fw-bold d-flex align-items-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> FORM INPUT TIKET
            </div>
            <div class="card-body">
                <form id="jobForm">
                    <div class="row g-3">
                        <div class="col-12 col-md-4">
                            <label for="tanggal" class="form-label">Tanggal <span class="text-danger">*</span></label>
                            <input type="date" id="tanggal" class="form-control" required>
                        </div>

                        <div class="col-12 col-md-4">
                            <label for="jam" class="form-label">Waktu <span class="text-danger">*</span></label>
                            <div class="d-flex gap-1 time-picker-wrapper">
                                <select id="jam" class="form-select" required></select>
                                <select id="menit" class="form-select" required></select>
                                <button type="button" id="btnNow" class="btn btn-info text-white btn-now">Now</button>
                            </div>
                        </div>

                        <div class="col-12 col-md-4">
                            <label for="priority" class="form-label">Prioritas <span class="text-danger">*</span></label>
                            <select id="priority" class="form-select" required>
                                <option value="LOW">🟢 LOW (Biasa)</option>

                                <option value="HIGH">🔴 HIGH (Urgent / Breakdown)</option>

                                <option value="PRESS03 PN1">PRESS03 PN1</option>

                                <option value="DP 1B">DP 1B</option>
                                <option value="DP 1C">DP 1C</option>
                                <option value="DP 2A">DP 2A</option>
                                <option value="DP 2B">DP 2B</option>

                                <option value="GLAZING LINE 1A">GLAZING LINE 1A</option>

                                <option value="KOMPRESSOR PN1">KOMPRESSOR PN1</option>

                        <div class="col-12">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* =====================================================
   CONFIG & APP STATE
===================================================== */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzApIiUbjDyTYkaJh5EmotOgyY7OwoxMzA_7HlQ9cf_L6GyZ7A1I_fMDszyKebfSolvAQ/exec";

const AppState = {
    editId: null,
    isSubmitting: false,
    isLoading: false,
    allData: [],
    filteredData: null,
    currentPage: 1,
    pageSize: 8
};

/* =====================================================
   AUTH MODULE (AUTHENTICATION VIA SERVER)
===================================================== */
const Auth = {
    login(userData) {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userRole", userData.role);
        localStorage.setItem("username", userData.name);
        updateAuthUI();
    },
    logout() {
        localStorage.clear();
        AppState.allData = [];
        updateAuthUI();
    },
    isLoggedIn() { return localStorage.getItem("isLoggedIn") === "true"; },
    getRole() { return localStorage.getItem("userRole") || ""; },
    getName() { return localStorage.getItem("username") || ""; }
};

function updateAuthUI() {
    const logged = Auth.isLoggedIn();
    document.getElementById("loginSection")?.classList.toggle("hidden", logged);
    document.getElementById("appSection")?.classList.toggle("hidden", !logged);

    if (logged) {
        document.getElementById("loginInfo").textContent = `LOGIN: ${Auth.getName()}`;
        const isReq = Auth.getRole() === "requestor";
        document.getElementById("keteranganGroup").style.display = isReq ? "none" : "block";
        document.getElementById("status").disabled = isReq;
    }
}

async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("btnLogin");
    const originalText = btn.innerHTML;

    btn.disabled = true;
    btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-1"></i> Checking...`;

    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
                action: "login",
                username: getValue("username"),
                password: getValue("password")
            })
        });

        const result = await res.json();

        if (result.success) {
            showToast("Login Berhasil!", "success");
            Auth.login(result.user);
            loadData();
        } else {
            showToast(result.message || "Login Gagal!", "danger");
            setValue("password", "");
        }
    } catch (err) {
        showToast("Terjadi kesalahan koneksi!", "danger");
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

/* =====================================================
   FETCH DATA & API INTERACTION
===================================================== */
async function loadData() {
    if (AppState.isLoading) return;
    AppState.isLoading = true;

    try {
        const response = await fetch(SCRIPT_URL + "?t=" + new Date().getTime());
        const result = await response.json();
        let rawData = Array.isArray(result) ? result : (result?.data || []);

        let dataStart = (rawData.length && String(rawData[0][0]).toLowerCase().includes("id")) ? 1 : 0;
        AppState.allData = rawData.slice(dataStart);
        
        applyFilters();
        updateDashboard();
    } catch (e) {
        showToast("Gagal memuat data!", "danger");
    } finally {
        AppState.isLoading = false;
    }
}

async function submitForm(e) {
    e.preventDefault();
    if (AppState.isSubmitting) return;

    const payload = {
        action: AppState.editId ? "update" : "add",
        id: AppState.editId,
        tanggal: getValue("tanggal"),
        jam: `${getValue("jam")}:${getValue("menit")}`,
        priority: getValue("priority"),
        requestor: getValue("requestor"),
        area: getValue("area"),
        deskripsi: getValue("deskripsi"),
        status: getValue("status") || "Open",
        keterangan: getValue("keterangan")
    };

    AppState.isSubmitting = true;
    showToast("Memproses data...", "info");

    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        
        if (result.success) {
            showToast("Berhasil menyimpan!", "success");
            resetForm();
            loadData();
        } else {
            showToast(result.message || "Gagal!", "danger");
        }
    } catch(err) {
        showToast("Terjadi kesalahan jaringan!", "danger");
    } finally {
        AppState.isSubmitting = false;
    }
}

/* =====================================================
   RENDER TABLE & FILTERING
===================================================== */
function applyFilters() {
    const key = getValue("searchHistory").toLowerCase();
    const st = getValue("filterStatus");
    const pr = getValue("filterPriority");

    AppState.filteredData = AppState.allData.filter(row => {
        const matchKey = !key || row.some(val => String(val).toLowerCase().includes(key));
        const matchSt = !st || String(row[7]).toLowerCase() === st.toLowerCase();
        const matchPr = !pr || String(row[9] || "MEDIUM").toUpperCase() === pr.toUpperCase();
        return matchKey && matchSt && matchPr;
    });

    AppState.currentPage = 1;
    renderTable();
}

function renderTable() {
    const tbody = document.getElementById("historyTable");
    const data = AppState.filteredData || AppState.allData;
    const isAdmin = Auth.getRole() === "admin";

    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="9" class="text-center py-3">Tidak ada data ditemukan</td></tr>`;
        return;
    }

    const start = (AppState.currentPage - 1) * AppState.pageSize;
    const pageData = data.slice(start, start + AppState.pageSize);

    let html = "";
    pageData.forEach((item) => {
        const priority = item[9] || "MEDIUM";

        html += `
        <tr>
            <td data-label="ID Tiket"><span class="ticket-badge">${item[0]}</span></td>
            <td data-label="Prioritas"><span class="priority-badge priority-${priority}">${priority}</span></td>
            <td data-label="Waktu">${item[1]} ${item[2]}</td>
            <td data-label="Deskripsi">${escapeHTML(item[5])}</td>
            <td data-label="Requestor">${escapeHTML(item[3])}</td>
            <td data-label="Area">${escapeHTML(item[4])}</td>
            <td data-label="Status"><b>${item[7]}</b></td>
            <td data-label="Keterangan">${escapeHTML(item[8] || "-")}</td>
            <td data-label="Aksi">
                ${isAdmin ? `<button class="btn btn-warning btn-sm py-0 me-1" onclick="prepareEdit('${item[0]}')">Edit</button><button class="btn btn-danger btn-sm py-0" onclick="deleteData('${item[0]}')">Hapus</button>` : "-"}
            </td>
        </tr>`;
    });

    tbody.innerHTML = html;
    document.getElementById("paginationInfo").textContent = `Halaman ${AppState.currentPage} / ${Math.ceil(data.length / AppState.pageSize)}`;
}

function prepareEdit(id) {
    const item = AppState.allData.find(row => String(row[0]) === String(id));
    if (!item) return;

    AppState.editId = item[0];
    setValue("tanggal", item[1]);
    
    const timeParts = String(item[2]).split(":");
    setValue("jam", timeParts[0] || "00");
    setValue("menit", timeParts[1] || "00");

    setValue("requestor", item[3]);
    setValue("area", item[4]);
    setValue("deskripsi", item[5]);
    setValue("status", item[7]);
    setValue("keterangan", item[8] || "");
    setValue("priority", item[9] || "MEDIUM");

    document.getElementById("submitBtn").classList.add("hidden");
    document.getElementById("updateBtn").classList.remove("hidden");
    document.getElementById("jobForm").scrollIntoView({ behavior: "smooth" });
}

async function deleteData(id) {
    if (!confirm(`Hapus tiket ${id}?`)) return;

    showToast("Menghapus...", "info");
    try {
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({ action: "delete", id: id })
        });
        const result = await res.json();
        if (result.success) {
            showToast("Berhasil dihapus!", "success");
            loadData();
        }
    } catch(e) {
        showToast("Gagal menghapus!", "danger");
    }
}

/* =====================================================
   EXPORT CSV FEATURE
===================================================== */
function exportCSV() {
    const data = AppState.filteredData || AppState.allData;
    if(!data.length) return showToast("Tidak ada data untuk diexport", "warning");

    let csvContent = "data:text/csv;charset=utf-8,ID Tiket,Tanggal,Jam,Requestor,Area,Deskripsi,Prioritas,Status,Keterangan\n";
    data.forEach(row => {
        csvContent += `"${row[0]}","${row[1]}","${row[2]}","${row[3]}","${row[4]}","${row[5]}","${row[9] || 'MEDIUM'}","${row[7]}","${row[8] || ''}"\n`;
    });

    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", `Work_Request_Report_${new Date().toISOString().slice(0,10)}.csv`);
    document.body.appendChild(link);
    link.click();
    link.remove();
}

/* =====================================================
   HELPERS & INIT
===================================================== */
function getValue(id) { return document.getElementById(id)?.value || ""; }
function setValue(id, val) { if(document.getElementById(id)) document.getElementById(id).value = val; }
function escapeHTML(str) { return String(str ?? "").replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m])); }

function resetForm() {
    AppState.editId = null;
    document.getElementById("jobForm").reset();
    document.getElementById("submitBtn").classList.remove("hidden");
    document.getElementById("updateBtn").classList.add("hidden");
    setDefaultTime();
}

function setDefaultTime() {
    const now = new Date();
    setValue("tanggal", now.toISOString().split("T")[0]);
    setValue("jam", String(now.getHours()).padStart(2, "0"));
    setValue("menit", String(now.getMinutes()).padStart(2, "0"));
}

function updateDashboard() {
    let open = 0, progress = 0, done = 0;
    AppState.allData.forEach(row => {
        const status = String(row[7]).toLowerCase();
        if(status === 'open') open++;
        else if(status === 'progress') progress++;
        else if(status === 'done') done++;
    });
    document.getElementById("openCount").textContent = open;
    document.getElementById("progressCount").textContent = progress;
    document.getElementById("doneCount").textContent = done;
}

function showToast(msg, type = "info") {
    const toast = document.createElement("div");
    toast.className = `alert alert-${type} position-fixed top-0 end-0 m-3 shadow z-3`;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

document.addEventListener("DOMContentLoaded", () => {
    const jam = document.getElementById("jam"), menit = document.getElementById("menit");
    for(let i=0; i<24; i++) jam.add(new Option(String(i).padStart(2,"0"), String(i).padStart(2,"0")));
    for(let i=0; i<60; i++) menit.add(new Option(String(i).padStart(2,"0"), String(i).padStart(2,"0")));

    setDefaultTime();
    updateAuthUI();

    document.getElementById("loginForm").onsubmit = handleLogin;
    document.getElementById("btnLogout").onclick = () => Auth.logout();
    document.getElementById("jobForm").onsubmit = submitForm;
    document.getElementById("resetBtn").onclick = resetForm;
    document.getElementById("btnNow").onclick = setDefaultTime;
    document.getElementById("btnExport").onclick = exportCSV;

    document.getElementById("searchHistory").oninput = applyFilters;
    document.getElementById("filterStatus").onchange = applyFilters;
    document.getElementById("filterPriority").onchange = applyFilters;

    document.getElementById("prevBtn").onclick = () => { if (AppState.currentPage > 1) { AppState.currentPage--; renderTable(); } };
    document.getElementById("nextBtn").onclick = () => { if (AppState.currentPage < Math.ceil((AppState.filteredData || AppState.allData).length / AppState.pageSize)) { AppState.currentPage++; renderTable(); } };

    setInterval(() => document.getElementById("clockIndo").textContent = new Date().toLocaleString("id-ID"), 1000);
    if(Auth.isLoggedIn()) loadData();
});
</script>
</body>
