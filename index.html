<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Request System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hidden{display:none;}
.card{border:none;box-shadow:0 2px 10px rgba(0,0,0,.1);}
.status-badge{padding:6px 10px;border-radius:8px;font-weight:600;}
.bg-soft-danger{background:#fee2e2;}
.bg-soft-warning{background:#fef9c3;}
.bg-soft-success{background:#dcfce7;}
</style>
</head>

<body>

<div class="container mt-4">

<!-- LOGIN -->
<div id="loginSection" class="card p-4 mx-auto" style="max-width:400px;">
<h4 class="text-center">Login</h4>

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100" onclick="handleLogin()">Login</button>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

<div class="d-flex justify-content-between mb-3">
<h4>Work Request</h4>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>

<h6 id="clockIndo"></h6>

<!-- FORM -->
<div class="card p-3 mb-3">

<form id="jobForm">

<input type="date" id="tanggal" class="form-control mb-2">

<div class="d-flex gap-2 mb-2">
<select id="jam" class="form-select"></select>
<select id="menit" class="form-select"></select>
</div>

<input id="requestor" class="form-control mb-2" placeholder="Requestor">

<select id="area" class="form-select mb-2">
<option>OFFICE</option>
<option>PRODUKSI</option>
<option>WAREHOUSE</option>
</select>

<textarea id="deskripsi" class="form-control mb-2" placeholder="Deskripsi"></textarea>

<select id="status" class="form-select mb-2">
<option>Open</option>
<option>Progress</option>
<option>Done</option>
</select>

<input id="keterangan" class="form-control mb-2" placeholder="Keterangan">

<button class="btn btn-success w-100" type="submit" id="submitBtn">Simpan</button>

</form>
</div>

<!-- TABLE -->
<table class="table table-bordered">
<thead>
<tr>
<th>ID</th><th>Tanggal</th><th>Jam</th><th>Deskripsi</th><th>Status</th><th>Aksi</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

</div>
</div>

<script>
	let currentRole = "";
let currentUser = "";
let currentId = null;
let allData = [];

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzApIiUbjDyTYkaJh5EmotOgyY7OwoxMzA_7HlQ9cf_L6GyZ7A1I_fMDszyKebfSolvAQ/exec";

const USERS = [
{username:"admin",password:"190626",role:"admin"},
{username:"karupn1",password:"krpn1",role:"requestor"}
];

document.addEventListener("DOMContentLoaded",()=>{
populateTime();
setClock();
setInterval(setClock,1000);

if(sessionStorage.getItem("role")){
currentRole = sessionStorage.getItem("role");
currentUser = sessionStorage.getItem("user");
showApp();
}
});

function handleLogin(){
const u = username.value;
const p = password.value;

const user = USERS.find(x=>x.username===u && x.password===p);

if(!user){return alert("Login gagal");}

sessionStorage.setItem("role",user.role);
sessionStorage.setItem("user",user.username);
location.reload();
}

function logout(){
sessionStorage.clear();
location.reload();
}

function showApp(){
loginSection.classList.add("hidden");
appSection.classList.remove("hidden");

if(currentRole==="requestor"){
requestor.value = currentUser;
requestor.readOnly = true;
}

loadData();
}
	async function loadData(){
try{
const res = await fetch(WEBAPP_URL);
const json = await res.json();

allData = json.data || [];
renderTable(allData);

}catch(e){
console.log(e);
}
}

function renderTable(data){
historyTable.innerHTML = data.map(x=>`
<tr>
<td>${x.id}</td>
<td>${x.tanggal}</td>
<td>${x.jam}</td>
<td>${x.deskripsi}</td>
<td>${x.status}</td>
<td>
<button onclick="editData('${x.id}')">Edit</button>
<button onclick="deleteData('${x.id}')">Hapus</button>
</td>
</tr>
`).join("");
}
	jobForm.addEventListener("submit", async (e)=>{
e.preventDefault();

const payload = {
action: currentId ? "update":"add",
id: currentId,
tanggal: tanggal.value,
jam: jam.value+":"+menit.value,
requestor: requestor.value,
deskripsi: deskripsi.value,
area: area.value,
status: status.value,
keterangan: keterangan.value
};

const res = await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const json = await res.json();

if(json.success){
resetForm();
loadData();
}
});

function editData(id){
const d = allData.find(x=>x.id==id);
currentId = id;

tanggal.value = d.tanggal;
requestor.value = d.requestor;
area.value = d.area;
deskripsi.value = d.deskripsi;
status.value = d.status;
keterangan.value = d.keterangan;
}

async function deleteData(id){
await fetch(WEBAPP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"delete",id})
});

loadData();
}
	function generateTicket(){
const now = new Date();
const y = String(now.getFullYear()).slice(2);
const m = String(now.getMonth()+1).padStart(2,"0");
const d = String(now.getDate()).padStart(2,"0");

const counter = Math.floor(Math.random()*900+100);

return y+m+d+counter;
}

function resetForm(){
jobForm.reset();
currentId = null;
submitBtn.innerText = "Simpan";
setClock();
}

function setClock(){
clockIndo.innerText = new Date().toLocaleString("id-ID");
}

function populateTime(){
for(let i=0;i<24;i++){
jam.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}
for(let i=0;i<60;i++){
menit.innerHTML += `<option>${String(i).padStart(2,'0')}</option>`;
}
}
	</script>
</body>
</html>
